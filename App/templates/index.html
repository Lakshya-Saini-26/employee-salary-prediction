<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Salary Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Employee Salary Predictor</h1>

        <form action="/predict" method="post">
            <label for="age">Age</label>
            <input type="number" step="1" min="18" max="70" name="age"
                   value="{{ selected_age or '' }}" required>

            <label for="gender">Gender</label>
            <select name="gender" required>
                <option value="" disabled {% if not selected_gender %}selected{% endif %}>Select gender</option>
                {% for g in genders %}
                <option value="{{ g }}" {% if selected_gender == g %}selected{% endif %}>{{ g }}</option>
                {% endfor %}
            </select>

            <label for="education">Education Level</label>
            <select name="education" required>
                <option value="" disabled {% if not selected_education %}selected{% endif %}>Select education</option>
                {% for e in education_levels %}
                <option value="{{ e }}" {% if selected_education == e %}selected{% endif %}>{{ e }}</option>
                {% endfor %}
            </select>

            <label for="years_experience">Years of Experience</label>
            <input type="number" step="0.5" min="0" max="40" name="years_experience"
                   value="{{ selected_experience or '' }}" required>

            <label for="job_title">Job Title</label>
            <select name="job_title" required>
                <option value="" disabled {% if not selected_job %}selected{% endif %}>Select job title</option>
                {% for j in job_titles %}
                <option value="{{ j }}" {% if selected_job == j %}selected{% endif %}>{{ j }}</option>
                {% endfor %}
            </select>

            <button type="submit">Predict Salary</button>
        </form>

        {% if prediction_text %}
        <h2 class="result">{{ prediction_text }}</h2>
        {% endif %}
    </div>
</body>
</html>
